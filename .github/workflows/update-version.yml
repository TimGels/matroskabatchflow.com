name: Update latest version

on:
  # Triggered from the app repo when a new release is published.
  repository_dispatch:
    types: [release-published]
  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest release tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Temporarily disable 'exit on error' so a 404 from gh api doesn't fail the step
          set +e
          TAG=$(gh api repos/TimGels/Matroska-Batch-Flow/releases/latest \
            --jq '.tag_name')
          status=$?
          set -e

          if [ "$status" -ne 0 ] || [ -z "$TAG" ]; then
            echo "No releases found or failed to fetch latest release
          set -e

          if [ "$status" -ne 0 ] || [ -z "$TAG" ]; then
            echo "No releases found or failed to fetch latest release, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Latest version: $TAG"

      - name: Update version config
        if: steps.version.outputs.skip == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          FILE="src/config/version.ts"

          # Replace the version string on the export const latestVersion line
          sed -i "s|export const latestVersion = '.*';|export const latestVersion = '${TAG}';|" "$FILE"

          echo "Updated $FILE to $TAG"
          grep "latestVersion" "$FILE"

      - name: Commit and push
        if: steps.version.outputs.skip == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/config/version.ts

          # Only commit if the file actually changed
          if git diff --cached --quiet; then
            echo "Version already up-to-date, nothing to commit."
          else
            git commit -m "chore: update latest version to ${TAG}"
            git push
          fi
